<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kebab Kings Order System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="main-container">
      <header>
        <div class="logo-section">
          <img
            src="assets/images/Kebab Kings Logo.png"
            width="194"
            height="134"
            alt=""
            srcset=""
          />
        </div>
        <h1 class="page-title">Kebab Kings Order System</h1>
        <div style="width: 100px"></div>
      </header>

      <div class="top-nav">
        <nav id="category-filters">
          <a href="#" class="active" onclick="filterByCategory('all', this)"
            >All</a
          >
          <a href="#" onclick="filterByCategory('kebab', this)">Kebabs</a>
          <a href="#" onclick="filterByCategory('pizza', this)">Pizzas</a>
          <a href="#" onclick="filterByCategory('drink', this)">Drinks</a>
          <a href="#" onclick="filterByCategory('side', this)">Sides</a>
        </nav>

        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            placeholder="Search..."
            onkeyup="handleSearch()"
          />
          <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
      </div>

      <div class="menu-grid" id="items-menu"></div>
    </div>

    <aside class="sidebar">
      <h2>ORDER SUMMARY</h2>
      <p class="item-count"><span id="order-count">0</span> Items</p>

      <div class="order-items" id="order-items"></div>

      <div class="summary-footer">
        <div class="total-row">
          <span class="total-label">Total Price :</span>
          <span class="total-price" id="total-price">£47.65</span>
        </div>
        <button class="confirm-btn" onclick="confirmBtn()">
          Confirm Order
        </button>
      </div>
    </aside>

    <!-- Javascript -->
    <script src="assets/javascript/script.js"></script>
  </body>
</html>
